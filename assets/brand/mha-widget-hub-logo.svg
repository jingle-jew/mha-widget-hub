<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MHA Widget Hub logo">
  <defs>
    <linearGradient id="bg" x1="88" y1="72" x2="300" y2="302" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F5FAFF"/>
      <stop offset="0.52" stop-color="#CCE2FF"/>
      <stop offset="1" stop-color="#97B9FF"/>
    </linearGradient>
    <radialGradient id="blobA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(118 94) rotate(47) scale(118 108)">
      <stop stop-color="#5BBAFF" stop-opacity=".38"/>
      <stop offset="1" stop-color="#5BBAFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(258 254) rotate(47) scale(128 112)">
      <stop stop-color="#9770FF" stop-opacity=".42"/>
      <stop offset="1" stop-color="#9770FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="phone" x1="138" y1="80" x2="258" y2="276" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity=".92"/>
      <stop offset="1" stop-color="white" stop-opacity=".62"/>
    </linearGradient>
    <linearGradient id="tile" x1="150" y1="112" x2="252" y2="240" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity=".9"/>
      <stop offset="1" stop-color="white" stop-opacity=".56"/>
    </linearGradient>
    <linearGradient id="titleGradient" x1="380" y1="90" x2="900" y2="180" gradientUnits="userSpaceOnUse">
