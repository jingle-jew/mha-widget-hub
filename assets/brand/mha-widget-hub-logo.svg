  <text x="380" y="158" fill="url(#titleGradient)" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="72" font-weight="850" letter-spacing="-2.4">MHA Widget Hub</text>
  <text x="384" y="218" fill="#667085" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="32" font-weight="650" letter-spacing="-0.3">The family-first Home Assistant launcher.</text>
