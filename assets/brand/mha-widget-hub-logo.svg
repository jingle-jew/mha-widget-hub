    <rect x="68" y="55" width="250" height="250" rx="56" fill="url(#blobA)"/>
    <rect x="68" y="55" width="250" height="250" rx="56" fill="url(#blobB)"/>
    <rect x="78" y="65" width="230" height="230" rx="51" stroke="white" stroke-opacity=".38" stroke-width="1.2"/>
