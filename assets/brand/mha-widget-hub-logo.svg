      <rect x="135" y="93" width="116" height="170" rx="22" fill="white" fill-opacity=".15" stroke="white" stroke-opacity=".28" stroke-width=".7"/>
      <rect x="173" y="94" width="40" height="8" rx="4" fill="#3A4868" fill-opacity=".78"/>
      <rect x="146" y="114" width="94" height="38" rx="12" fill="url(#tile)" stroke="white" stroke-opacity=".82" stroke-width=".8"/>
      <circle cx="163" cy="131" r="8" fill="#4BB2FF"/>
      <rect x="178" y="124" width="48" height="6" rx="3" fill="#5D83FF" fill-opacity=".84"/>
      <rect x="178" y="136" width="36" height="5" rx="2.5" fill="#8B72FF" fill-opacity=".66"/>
      <rect x="146" y="161" width="41" height="41" rx="12" fill="url(#tile)" stroke="white" stroke-opacity=".82" stroke-width=".8"/>
      <rect x="199" y="161" width="41" height="41" rx="12" fill="url(#tile)" stroke="white" stroke-opacity=".82" stroke-width=".8"/>
      <rect x="146" y="211" width="94" height="30" rx="12" fill="url(#tile)" stroke="white" stroke-opacity=".82" stroke-width=".8"/>
      <rect x="155" y="179" width="24" height="6" rx="3" fill="#50C896" fill-opacity=".88"/>
