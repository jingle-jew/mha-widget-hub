<!doctype html>
<html lang="fr" data-theme="dark" data-theme-style="oneui" data-layout-mode="auto" data-icon-shape="squircle">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>MHA</title>
  <style>
    html,body{width:100%;min-height:100%;margin:0;background:linear-gradient(135deg,#171b30,#242844);color:white;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",sans-serif;overflow:hidden}
    .dev-menu{position:fixed;z-index:9999;top:max(14px,env(safe-area-inset-top));right:max(14px,env(safe-area-inset-right));font-size:12px;font-weight:750}
    .dev-toggle{appearance:none;border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:9px 13px;background:rgba(10,10,18,.62);color:inherit;font:inherit;cursor:pointer;backdrop-filter:blur(22px) saturate(150%);box-shadow:0 14px 42px rgba(0,0,0,.28)}
    .dev-toggle:hover,.dev-toggle[aria-expanded="true"]{background:rgba(255,255,255,.16)}
    .dev-panel{position:absolute;top:calc(100% + 8px);right:0;display:grid;grid-template-columns:repeat(2,max-content);gap:8px;width:max-content;max-width:calc(100vw - 24px);padding:10px;border:1px solid rgba(255,255,255,.16);border-radius:18px;background:rgba(10,10,18,.72);backdrop-filter:blur(24px) saturate(155%);box-shadow:0 22px 70px rgba(0,0,0,.36)}
    .dev-panel[hidden]{display:none}
    .dev-panel button,.dev-panel select{appearance:none;min-height:34px;border:0;border-radius:999px;padding:8px 12px;background:rgba(255,255,255,.12);color:inherit;font:inherit;font-size:12px;font-weight:750;cursor:pointer}
    .dev-panel button:hover,.dev-panel select:hover{background:rgba(255,255,255,.2)}
    .dev-panel select{grid-column:1/-1;width:100%}
    @media (max-width:420px){.dev-panel{grid-template-columns:1fr;width:min(260px,calc(100vw - 24px))}.dev-panel button,.dev-panel select{width:100%}}
    .dev-weather-panel{position:fixed;z-index:9998;left:50%;bottom:max(18px,env(safe-area-inset-bottom));translate:-50% 0;display:grid;gap:10px;width:min(620px,calc(100vw - 28px));padding:12px;border:1px solid rgba(255,255,255,.16);border-radius:22px;background:rgba(10,10,18,.72);backdrop-filter:blur(24px) saturate(155%);box-shadow:0 22px 70px rgba(0,0,0,.36)}
    .dev-weather-panel[hidden]{display:none}
    .dev-weather-panel__title{font-size:12px;font-weight:800;letter-spacing:.02em;opacity:.72}
    .dev-weather-panel__controls{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
    .dev-weather-panel__control{display:grid;gap:5px;font-size:11px;font-weight:750;opacity:.78}
    .dev-weather-panel select{appearance:none;width:100%;min-height:38px;border:0;border-radius:999px;padding:8px 12px;background:rgba(255,255,255,.12);color:inherit;font:inherit;font-size:12px;font-weight:750;cursor:pointer;opacity:1}
    .dev-weather-panel select:hover{background:rgba(255,255,255,.2)}
    @media (max-width:560px){.dev-weather-panel__controls{grid-template-columns:1fr}}
    mha-widget-hub{width:100vw;height:100vh;display:block}
  </style>
</head>
<body>
  <div class="dev-menu" data-dev-menu>
    <div class="dev-panel" id="dev-panel" hidden>
    <button data-dev-action="nowbar">NowBar</button>
    <select data-dev-action="theme-style"><option value="oneui">OneUI</option><option value="ios">iOS</option><option value="material">Material</option></select>
    <select data-dev-action="icon-shape" aria-label="Icon shape">
      <option value="rounded-square">Rounded-square icons</option>
      <option value="squircle">Squircle icons</option>
      <option value="circle">Circle icons</option>
    </select>
    <select data-dev-action="clock-variant"><option value="digital">Digital</option><option value="analog-ios">Analog iOS</option><option value="analog-minimal">Analog minimal</option><option value="analog-bold">Analog bold</option><option value="analog-glass">Analog glass</option></select>
    </div>
  </div>

      resolveWeatherLandscapeAmbience,

    const devMenu = document.querySelector("[data-dev-menu]");

    const DEV_WEATHER_SCENARIOS = Object.freeze([
      { id: "sunny", label: "Soleil", condition: "sunny", cloudCoverage: 8, windSpeed: 6 },
      { id: "clear-night", label: "Ciel clair (nuit)", condition: "clear-night", cloudCoverage: 10, windSpeed: 7 },
      { id: "exceptional", label: "Exceptionnel", condition: "exceptional", cloudCoverage: 12, windSpeed: 8 },
      { id: "partlycloudy", label: "Éclaircies", condition: "partlycloudy", cloudCoverage: 48, windSpeed: 12 },
      { id: "windy", label: "Venteux", condition: "windy", cloudCoverage: 58, windSpeed: 46 },
      { id: "windy-variant", label: "Venteux et nuageux", condition: "windy-variant", cloudCoverage: 72, windSpeed: 54 },

    const DEFAULT_DEV_WEATHER_SCENARIO = "partlycloudy";

    let devWeatherScenarioId = DEFAULT_DEV_WEATHER_SCENARIO;
    let devWeatherMoment = DEFAULT_DEV_WEATHER_MOMENT;
    let devMockHass = null;

    function readDevPreference(key, legacyKey, fallback) {
      const current = localStorage.getItem(key);
      if (current !== null) return current;

      const legacy = localStorage.getItem(legacyKey);
      if (legacy !== null) {
        localStorage.setItem(key, legacy);
        return legacy;
      }

      return fallback;
    }

    function setDevMenuOpen(isOpen) {
      devPanel.hidden = !isOpen;
      devToggle.setAttribute("aria-expanded", String(isOpen));
    }


    function readThemeBackdropSnapshot() {
      const style = getComputedStyle(hub);

      const values = [
        style.getPropertyValue("--mha-page-bg").trim(),
        style.getPropertyValue("--mha-background").trim(),
        style.getPropertyValue("--mha-shell-bg").trim(),
      ].filter(Boolean);

      return values[0] || document.body.style.background || "transparent";
    }

    function prepareThemeBackdropCrossfade() {
      const snapshot = readThemeBackdropSnapshot();
      hub.style.setProperty("--mha-theme-crossfade-from", snapshot);
      hub.classList.remove("is-theme-backdrop-crossfading");
      void hub.offsetWidth;
    }

    function runThemeBackdropCrossfade() {
      hub.classList.add("is-theme-backdrop-crossfading");

      window.clearTimeout(window.__mhaThemeBackdropCrossfadeTimer);
      window.__mhaThemeBackdropCrossfadeTimer = window.setTimeout(() => {
        hub.classList.remove("is-theme-backdrop-crossfading");
        hub.style.removeProperty("--mha-theme-crossfade-from");
      }, 2000);
    }

    function setTheme(theme = "dark") {
      const resolved = theme === "light" ? "light" : "dark";
      prepareThemeBackdropCrossfade();

      document.documentElement.dataset.theme = resolved;
      document.documentElement.setAttribute("data-theme", resolved);

      hub.dataset.theme = resolved;
      hub.setAttribute("data-theme", resolved);

      localStorage.setItem("mha-dev-theme", resolved);
      runThemeBackdropCrossfade();
    }

    function toggleTheme() {
      setTheme(document.documentElement.dataset.theme === "dark" ? "light" : "dark");
    }

    function setThemeStyle(style = "oneui") {
      const resolved = ["ios", "oneui", "material"].includes(style) ? style : "oneui";
      prepareThemeBackdropCrossfade();

      document.documentElement.dataset.themeStyle = resolved;
      document.documentElement.setAttribute("data-theme-style", resolved);

      hub.dataset.themeStyle = resolved;
      hub.setAttribute("data-theme-style", resolved);

      localStorage.setItem("mha-dev-theme-style", resolved);

      const select = document.querySelector("[data-dev-action='theme-style']");
      if (select) select.value = resolved;

      runThemeBackdropCrossfade();
    }


    function setIconShape(shape = "squircle") {
      const resolved = ["rounded-square", "squircle", "circle"].includes(shape) ? shape : "squircle";
      prepareThemeBackdropCrossfade();

      document.documentElement.dataset.iconShape = resolved;
      document.documentElement.setAttribute("data-icon-shape", resolved);

      hub.dataset.iconShape = resolved;
      hub.setAttribute("data-icon-shape", resolved);

      localStorage.setItem("mha-dev-icon-shape", resolved);

      const select = document.querySelector('[data-dev-action="icon-shape"]');
      if (select) select.value = resolved;

      runThemeBackdropCrossfade();
    }

    function setLayoutMode(mode = "auto") {
      document.documentElement.dataset.layoutMode = mode;

      if (mode === "auto") {
        delete document.documentElement.dataset.layout;
        delete hub.dataset.layout;
        hub.dataset.layoutMode = "auto";
      } else {
        document.documentElement.dataset.layout = mode;
        hub.dataset.layout = mode;
        hub.dataset.layoutMode = mode;
      }

      localStorage.setItem("mha-dev-layout-mode", mode);
      hub.requestRender?.();
    }

    if (devToggle) devToggle.onclick = () => setDevMenuOpen(devPanel.hidden);

    document.addEventListener("click", (event) => {
      if (!devPanel.hidden && !devMenu.contains(event.target)) setDevMenuOpen(false);
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") setDevMenuOpen(false);
    });

    document.querySelector("[data-dev-action='theme']")?.addEventListener("click", toggleTheme);
    document.querySelector("[data-dev-action='edit']")?.addEventListener("click", () => hub.toggleEditMode?.());
    document.querySelector("[data-dev-action='auto']")?.addEventListener("click", () => setLayoutMode("auto"));
    document.querySelector("[data-dev-action='mobile']")?.addEventListener("click", () => setLayoutMode("mobile"));
    document.querySelector("[data-dev-action='tablet']")?.addEventListener("click", () => setLayoutMode("tablet"));
    document.querySelector("[data-dev-action='desktop']")?.addEventListener("click", () => setLayoutMode("desktop"));
    document.querySelector("[data-dev-action='reset']")?.addEventListener("click", () => hub.resetGrid?.());
    document.querySelector("[data-dev-action='screensaver']")?.addEventListener("click", () => hub.toggleScreensaverPreview?.());
    document.querySelector("[data-dev-action='nowbar']")?.addEventListener("click", () => hub.toggleNowBarPreview?.());
    document.querySelector("[data-dev-action='theme-style']")?.addEventListener("change", (event) => setThemeStyle(event.target.value));
    const iconShapeSelect = document.querySelector('[data-dev-action="icon-shape"]');
    iconShapeSelect?.addEventListener("change", (event) => setIconShape(event.target.value));
    iconShapeSelect?.addEventListener("input", (event) => setIconShape(event.target.value));

    document.querySelector("[data-dev-action='clock-variant']")?.addEventListener("change", (event) => hub.setScreensaverClockVariant?.(event.target.value));

    setTheme(readDevPreference("mha-dev-theme", `${legacyDevPrefix}-theme`, "dark"));
    setThemeStyle(readDevPreference("mha-dev-theme-style", `${legacyDevPrefix}-theme-style`, "oneui"));
    setIconShape(readDevPreference("mha-dev-icon-shape", `${legacyDevPrefix}-icon-shape`, "squircle"));
    setLayoutMode(readDevPreference("mha-dev-layout-mode", `${legacyDevPrefix}-layout-mode`, "auto"));

    function createMockEntity(entityId, state, attributes = {}) {
      return {
        entity_id: entityId,
        state,
        attributes,
        last_changed: new Date().toISOString(),
        last_updated: new Date().toISOString(),
      };
    }

          || entityId.startsWith("sensor.val_d_or_");
        return {
          entity_id: entityId,
          platform: isWeatherSource ? "environment_canada" : "mha_dev",
          config_entry_id: isWeatherSource ? WEATHER_CONFIG_ENTRY_ID : "dev-general-entry",
          device_id: isWeatherSource ? WEATHER_DEVICE_ID : "dev-general-device",
          disabled_by: null,
          hidden_by: null,
          entity_category: null,
          original_name: entity.attributes?.friendly_name || entityId,
          original_device_class: entity.attributes?.device_class || null,
        };
      });
      const deviceRegistry = [
        {
          id: WEATHER_DEVICE_ID,
          name: "Station météo Val-d'Or",
          config_entries: [WEATHER_CONFIG_ENTRY_ID],
        },
        {
          id: "dev-general-device",
          name: "MHA Dev",
          config_entries: ["dev-general-entry"],
        },
      ];

      return {
        states,
        language: "fr",
        locale: { language: "fr-CA", number_format: "comma_decimal" },
        config: {
          unit_system: {
            temperature: "°C",
            wind_speed: "km/h",
            pressure: "hPa",
            length: "km",
            precipitation: "mm",
          },
        },
        user: { id: "dev-user", name: "Dev local", is_admin: true },
        callWS(payload = {}) {
          console.info("[MHA dev] callWS", payload);
          if (payload.type === "mha_widget_hub/entity_visibility/get") {
            return Promise.resolve({
              version: 1,
              users: {
                "dev-user": {
                  unrestricted: true,
                  allowedEntities: {},
                },
              },
            });
          }
          if (payload.type === "mha_widget_hub/users/list") {
            return Promise.resolve({ users: [{ id: "dev-user", name: "Dev local" }] });
          }
          if (payload.type === "config/entity_registry/list") {
            return Promise.resolve(entityRegistry);
          }
          if (payload.type === "config/device_registry/list") {
            return Promise.resolve(deviceRegistry);
          }
          if (
            payload.type === "call_service"
            && payload.domain === "weather"
            && payload.service === "get_forecasts"
          ) {
            const entityId = Array.isArray(payload.target?.entity_id)
              ? payload.target.entity_id[0]
              : payload.target?.entity_id || "weather.val_d_or_previsions";
            const forecast = payload.service_data?.type === "hourly"
              ? hourlyForecast
              : dailyForecast;
            return Promise.resolve({
              response: {
                [entityId]: { forecast },
              },
            });
          }
          return Promise.resolve({});
        },
        callService(domain, service, data = {}) {
          console.info("[MHA dev] callService", domain, service, data);
          const entityId = data.entity_id;
          const entity = states[entityId];
          if (!entity) return Promise.resolve();

          if (["light", "switch", "input_boolean"].includes(domain)) {
            if (service === "toggle") entity.state = entity.state === "on" ? "off" : "on";
            if (service === "turn_on") entity.state = "on";
            if (service === "turn_off") entity.state = "off";
            if (domain === "light" && Number.isFinite(Number(data.brightness))) {
              entity.attributes.brightness = Number(data.brightness);
            }
            if (domain === "light" && Number.isFinite(Number(data.brightness_pct))) {
              entity.attributes.brightness = Math.round(Number(data.brightness_pct) * 2.55);
            }
          }

          if (domain === "media_player" && Number.isFinite(Number(data.volume_level))) {
            entity.attributes.volume_level = Number(data.volume_level);
          }

          entity.last_updated = new Date().toISOString();
          hub.hass = { ...hub.hass, states: { ...states } };
          return Promise.resolve();
        },
      };
    }

    function setDevWeatherScenario(scenarioId = DEFAULT_DEV_WEATHER_SCENARIO) {
      if (!devMockHass) return false;
      const scenario = DEV_WEATHER_SCENARIOS.find(item => item.id === scenarioId)
        || DEV_WEATHER_SCENARIOS.find(item => item.id === DEFAULT_DEV_WEATHER_SCENARIO);
      const nextStates = { ...devMockHass.states };

      ["weather.val_d_or_previsions", "weather.home"].forEach((entityId) => {
        const current = nextStates[entityId];
        if (!current) return;
        nextStates[entityId] = {
          ...current,
          state: scenario.condition,
          attributes: {
            ...current.attributes,
            cloud_coverage: scenario.cloudCoverage,
            wind_speed: scenario.windSpeed,
          },
          last_updated: new Date().toISOString(),
        };
      });

      devWeatherScenarioId = scenario.id;
      devMockHass = { ...devMockHass, states: nextStates };
      hub.hass = devMockHass;
      hub.requestRender?.();
      return true;
    }

    function setDevWeatherMoment(moment = DEFAULT_DEV_WEATHER_MOMENT) {
      if (!devMockHass) return false;
      const resolvedMoment = WEATHER_LANDSCAPE_MOMENTS.includes(moment)
        ? moment
        : DEFAULT_DEV_WEATHER_MOMENT;
      const nextStates = { ...devMockHass.states };
      const sun = nextStates["sun.sun"];
      if (!sun) return false;
      const isDay = ["sunrise", "morning", "afternoon", "sunset"].includes(resolvedMoment);

      nextStates["sun.sun"] = {
        ...sun,
        state: isDay ? "above_horizon" : "below_horizon",
        attributes: {
          ...sun.attributes,
          _mha_weather_period_override: resolvedMoment,
        },
        last_changed: new Date().toISOString(),
        last_updated: new Date().toISOString(),
      };

      devWeatherMoment = resolvedMoment;
      devMockHass = { ...devMockHass, states: nextStates };
      hub.hass = devMockHass;
      hub.requestRender?.();
      return true;
    }

    function mountDevWeatherPanel() {
      let panel = document.querySelector("[data-dev-weather-panel]");
      if (!panel) {
        panel = document.createElement("section");
        panel.className = "dev-weather-panel";
        panel.dataset.devWeatherPanel = "true";
        panel.hidden = true;

        const title = document.createElement("div");
        title.className = "dev-weather-panel__title";
        title.textContent = "Scène météo · dev";

        const controls = document.createElement("div");
        controls.className = "dev-weather-panel__controls";

        const weatherControl = document.createElement("label");
        weatherControl.className = "dev-weather-panel__control";
        weatherControl.append(document.createTextNode("Météo"));
        const weatherSelect = document.createElement("select");
        weatherSelect.dataset.devWeatherCondition = "true";
        weatherSelect.setAttribute("aria-label", "Condition météo de la scène");
        DEV_WEATHER_SCENARIOS.forEach((scenario) => {
          const option = document.createElement("option");
          const ambience = resolveWeatherLandscapeAmbience(scenario.condition);
          option.value = scenario.id;
          option.textContent = `${scenario.label} · ${ambience}`;
          weatherSelect.append(option);
        });
        weatherSelect.value = devWeatherScenarioId;
        weatherSelect.onchange = () => setDevWeatherScenario(weatherSelect.value);
        weatherControl.append(weatherSelect);

        const momentControl = document.createElement("label");
        momentControl.className = "dev-weather-panel__control";
        momentControl.append(document.createTextNode("Heure"));
        const momentSelect = document.createElement("select");
        momentSelect.dataset.devWeatherMoment = "true";
        momentSelect.setAttribute("aria-label", "Heure de la scène météo");
        WEATHER_LANDSCAPE_MOMENTS.forEach((moment) => {
          const option = document.createElement("option");
          option.value = moment;
          option.textContent = DEV_WEATHER_MOMENT_LABELS[moment] || moment;
          momentSelect.append(option);
        });
        momentSelect.value = devWeatherMoment;
        momentSelect.onchange = () => setDevWeatherMoment(momentSelect.value);
        momentControl.append(momentSelect);

        controls.append(weatherControl, momentControl);

        panel.append(title, controls);
        document.body.append(panel);
      }

      syncDevWeatherPanelVisibility();
      return panel;
    }

    function syncDevWeatherPanelVisibility() {
      const panel = document.querySelector("[data-dev-weather-panel]");
      if (!panel) return;
      const weatherActive = hub.dataset.weatherPageActive === "true"
        || hub.dataset.activePageType === "weather"
        || Boolean(hub.shadowRoot?.querySelector?.('.mha-page-panel[data-page-type="weather"]'));
      panel.hidden = !weatherActive;
    }

    function observeDevWeatherPanel() {
      mountDevWeatherPanel();
      if (!hub.__mhaDevWeatherPanelObserver) {
        const hostObserver = new MutationObserver(syncDevWeatherPanelVisibility);
        hostObserver.observe(hub, {
          attributes: true,
          attributeFilter: ["data-weather-page-active", "data-active-page-type"],
        });
        hub.__mhaDevWeatherPanelObserver = hostObserver;
      }
      const root = hub.shadowRoot;
      if (root && !root.__mhaDevWeatherPanelObserver) {
        const rootObserver = new MutationObserver(syncDevWeatherPanelVisibility);
        rootObserver.observe(root, { childList: true, subtree: true });
        root.__mhaDevWeatherPanelObserver = rootObserver;
      }
      syncDevWeatherPanelVisibility();
    }

    if (!new URLSearchParams(location.search).has("no-hass")) {
      const attachMockHass = () => {
        devMockHass = createMockHass();
        hub.hass = devMockHass;
        hub.requestRender?.();
        observeDevWeatherPanel();
      };

      if (customElements.get("mha-widget-hub")) {
        attachMockHass();
      } else {
        customElements.whenDefined("mha-widget-hub").then(attachMockHass);
      }
    }

    window.__MHA_ICON_SHAPE_DEBUG__ = () => {
      const select = document.querySelector('[data-dev-action="icon-shape"]');
      const icon = hub.shadowRoot?.querySelector(".mha-icon");
      return {
        html: document.documentElement.getAttribute("data-icon-shape"),
        host: hub.getAttribute("data-icon-shape"),
        selectValue: select?.value ?? null,
        iconRadius: icon ? getComputedStyle(icon).borderRadius : null,
      };
    };

    window.__MHA_DEV__ = {
      hub,
      createMockHass,
      resetMockHass() {
        devWeatherScenarioId = DEFAULT_DEV_WEATHER_SCENARIO;
        devWeatherMoment = DEFAULT_DEV_WEATHER_MOMENT;
        devMockHass = createMockHass();
        hub.hass = devMockHass;
        hub.requestRender?.();
        const weatherSelect = document.querySelector("[data-dev-weather-condition]");
        const momentSelect = document.querySelector("[data-dev-weather-moment]");
        if (weatherSelect) weatherSelect.value = devWeatherScenarioId;
        if (momentSelect) momentSelect.value = devWeatherMoment;
        return hub.hass;
      },
      setTheme,
      toggleTheme,
      setThemeStyle,
      setLayoutMode,
      setIconShape,
      setDevWeatherScenario,
      setDevWeatherMoment,
      mountDevWeatherPanel,
    };
  </script>
</body>
</html>
