<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MHA Theme Studio</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/preview-layout.css">
  <style>.readonly-value{display:block;grid-column:1/-1;width:100%;padding:7px 8px;border:1px dashed rgba(255,255,255,.16);border-radius:7px;color:#aeb8cc;background:rgba(255,255,255,.035);font:10px/1.4 ui-monospace,SFMono-Regular,monospace;white-space:pre-wrap;overflow-wrap:anywhere}</style>
</head>
<body>
  <header class="topbar">
    <div class="brand"><span class="brand-mark">M</span><div><strong>Theme Studio</strong><small>MHA local design tool</small></div></div>
    <div class="context"><label>Thème <select id="theme-select"></select></label><label>Mode <select id="mode-select"><option value="light">Light</option><option value="dark" selected>Dark</option></select></label><label>Variante <select id="variant-select"></select></label></div>
    <div class="actions"><span id="dirty-state" class="status-pill">Synchronisé</span><button data-action="reset">Réinitialiser</button><button data-action="diff">Voir le diff</button><button class="primary" data-action="save">Enregistrer</button><button data-action="duplicate">Dupliquer</button><button data-action="new">Nouveau</button><button data-action="import">Importer</button><button data-action="export">Exporter</button><input id="import-file" type="file" accept="application/json" hidden></div>
  </header>
  <main class="workspace">
    <aside class="sidebar"><div class="sidebar-head"><div><small>INSPECTEUR</small><h1 id="theme-label">—</h1></div><button class="icon-button" data-action="reload" title="Recharger depuis le repo">↻</button></div><div id="read-only-note" class="notice" hidden>Ce thème est disponible en lecture seule : aucun contrôle Theme Studio n'est encore déclaré.</div><div id="controls" class="controls"></div></aside>
    <section class="stage"><div class="stage-toolbar"><div><span class="eyebrow">LIVE PREVIEW</span><strong id="preview-size">1440 × 900</strong></div><div class="toolbar-actions"><select id="viewport-select"><option value="390x844">Mobile portrait · 390 × 844</option><option value="844x390">Mobile paysage · 844 × 390</option><option value="768x1024">Tablette portrait · 768 × 1024</option><option value="1024x768">Tablette paysage · 1024 × 768</option><option value="1440x900" selected>Desktop · 1440 × 900</option><option value="1920x1080">Desktop large · 1920 × 1080</option><option value="custom">Personnalisé</option></select><select id="background-select"><option value="light">Gradient clair</option><option value="dark" selected>Gradient sombre</option><option value="color">Wallpaper coloré</option><option value="contrast">Très contrasté</option><option value="soft">Doux</option><option value="solid">Fond uni</option></select><button data-action="upload-wallpaper">Image locale</button><button data-action="clear-wallpaper">Retirer image</button><input id="wallpaper-file" type="file" accept="image/*" hidden></div></div><div class="preview-wrap"><div class="preview-frame" id="preview-frame"><iframe id="preview" title="Aperçu MHA en direct"></iframe></div></div><div class="stage-foot"><span>Les modifications restent temporaires jusqu'à « Appliquer au repo ».</span><span id="preview-state">Runtime MHA</span></div></section>
  </main>
  <dialog id="diff-dialog"><form method="dialog" class="dialog-card"><div class="dialog-head"><div><small>CHANGE REVIEW</small><h2>Diff avant écriture</h2></div><button value="cancel" class="icon-button">×</button></div><div id="diff-content" class="diff-content"></div><div class="dialog-actions"><button value="cancel">Annuler</button><button id="apply-button" type="button" class="primary">Appliquer au repo</button></div></form></dialog>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script type="module" src="/app.js"></script>
</body>
</html>
