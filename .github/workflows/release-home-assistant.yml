name: Publish Home Assistant Release Package

on:
  push:
    branches:
      - master
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-home-assistant-package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate source and package contracts
        run: npm run check

      - name: Build Home Assistant release ZIP
        run: npm run release:zip

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update GitHub Release and attach ZIPs
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: MHA Widget Hub ${{ steps.release_tag.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/mha-widget-hub.zip
            dist/mha-widget-hub-hacs.zip
          fail_on_unmatched_files: true
          overwrite_files: true

      - name: Upload ZIP artifact for manual runs
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: mha-widget-hub-home-assistant-package
          path: dist/*.zip
          if-no-files-found: error
