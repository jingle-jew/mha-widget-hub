name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - android-app
    paths:
      - "android-app/**"
      - ".github/workflows/android-app-apk.yml"
    tags:
      - "android-app-v*"

permissions:
  contents: write

jobs:
  build-android-apk:
    name: Build Android debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: android-app/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Install Android SDK packages
        run: |
          yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Install dependencies
        working-directory: android-app
        run: npm ci

      - name: Sync Capacitor Android project
        working-directory: android-app
        run: npm run sync

      - name: Build debug APK
        working-directory: android-app/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Prepare APK artifact
        run: |
          mkdir -p dist/android
          cp android-app/android/app/build/outputs/apk/debug/app-debug.apk \
            dist/android/mha-widget-hub-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mha-widget-hub-debug-apk
          path: dist/android/mha-widget-hub-debug.apk
          if-no-files-found: error

      - name: Attach APK to GitHub release
        if: startsWith(github.ref, 'refs/tags/android-app-v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/android/mha-widget-hub-debug.apk \
            --title "$GITHUB_REF_NAME" \
            --notes "Debug APK build for MHA Widget Hub Android app." \
          || gh release upload "$GITHUB_REF_NAME" \
            dist/android/mha-widget-hub-debug.apk \
            --clobber
