name: Publish Android Release Asset

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-android-release-asset:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app

    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android-app/android/release-keystore.jks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: android-app/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android wrapper dependencies
        run: npm ci

      - name: Decode release keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        shell: bash
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_KEYSTORE_PATH"

      - name: Sync Capacitor assets
        run: npm run sync

      - name: Make Gradle wrapper executable
        working-directory: android-app/android
        run: chmod +x ./gradlew

      - name: Build release APK
        working-directory: android-app/android
        run: ./gradlew assembleRelease

      - name: Resolve APK path
        id: apk
        shell: bash
        run: |
          if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            echo "path=android-app/android/app/build/outputs/apk/release/app-release.apk" >> "$GITHUB_OUTPUT"
            echo "name=mha-widget-hub-${GITHUB_REF_NAME:-release}.apk" >> "$GITHUB_OUTPUT"
          else
            echo "path=android-app/android/app/build/outputs/apk/release/app-release-unsigned.apk" >> "$GITHUB_OUTPUT"
            echo "name=mha-widget-hub-${GITHUB_REF_NAME:-release}-unsigned.apk" >> "$GITHUB_OUTPUT"
          fi

      - name: Attach APK to GitHub Release
        if: ${{ github.event_name == 'release' }}
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          fail_on_unmatched_files: true
          overwrite_files: true

      - name: Upload APK artifact for manual runs
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error

      - name: Remove temporary keystore
        if: ${{ always() && env.ANDROID_KEYSTORE_BASE64 != '' }}
        shell: bash
        run: rm -f "$ANDROID_KEYSTORE_PATH"
